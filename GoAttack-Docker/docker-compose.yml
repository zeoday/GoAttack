version: '3.8'

services:
  goattack-api:
    build:
      context: ../GoAttack-Api
      dockerfile: ../GoAttack-Docker/Dockerfile
    container_name: goattack-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=goattack
      - MYSQL_DB=goattack
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - goattack-net
    volumes:
      - ../GoAttack-Api/logs:/app/logs
      - ../GoAttack-Api/uploads:/app/uploads

  goattack-admin:
    build:
      context: ../GoAttack-Admin
      dockerfile: Dockerfile
    container_name: goattack-admin
    restart: always
    ports:
      - "80:80"
    depends_on:
      - goattack-api
    networks:
      - goattack-net

  mysql:
    image: mysql:8.0
    container_name: goattack-mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=goattack
      - MYSQL_DATABASE=goattack
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../GoAttack-Api/common/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - goattack-net
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0-alpine
    container_name: goattack-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - goattack-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  goattack-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
